name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run production build
        env:
          NEXT_PUBLIC_APP_URL: https://ci.placeholder.test
          NEXT_PUBLIC_SUPABASE_URL: https://ci.placeholder.test
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-key
        run: npm run build
